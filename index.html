<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>YT-DLP Downloader</title>
    <link rel="stylesheet" href="style.css">
</head>
<body data-theme="dark">

    <h1>🎬 YT-DLP Downloader</h1>

    <!-- Bottoni cartella -->
    <div style="text-align:center; margin-bottom:15px;">
        <button id="openFolderBtn">📁 Apri Cartella</button>
        <button id="setFolderBtn">📁 Seleziona Cartella</button>
        <label><input type="checkbox" id="audioOnlyChk">🎝 Solo Audio (MP3)</label>
    </div>

    <!-- Textarea per incollare URL -->
    <textarea id="urlArea" placeholder="👀 Incolla URL qui"></textarea>

    <!-- Lista video -->
    <div id="videoList"></div>

    <!-- Cancella lista -->
    <div style="text-align:center; margin-top:10px;">
        <button id="clearList">❌ Cancella Lista</button>
    </div>

    <!-- Bottone Dark/Light (posizionato in alto a destra) -->
<button id="themeToggle" style="position:fixed; top:10px; right:10px; z-index:1000; font-size:10px;">🌙</button>

    <script src="renderer.js"></script>
</body>
</html>
