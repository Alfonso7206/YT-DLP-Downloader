<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>YT-DLP Downloader</title>
    <link rel="stylesheet" href="style.css">
</head>
<body data-theme="dark">

    <h1>🎬 YT-DLP Downloader</h1>

    <!-- Bottoni cartella -->
    <div style="text-align:center; margin-bottom:15px;">
        <button id="openFolderBtn">📁 Apri Cartella</button>
        <button id="setFolderBtn">📁 Seleziona Cartella</button>
		<input type="text" id="folderLabel" readonly style="width:300px;" />
		</div>


    <!-- Textarea per incollare URL -->
	<div class="center">

    <textarea id="urlArea" placeholder="👀 Incolla URL qui"></textarea><br>
	</div>
<label>
    <input type="checkbox" id="audioOnlyChk">🎵 Solo Audio (MP3)
</label>
<label>
    <input type="checkbox" id="convertMkvChk">🔄 Converti in MKV
</label>
<label>
    <input type="checkbox" id="playlistChk">📃 Scarica Playlist
</label>
    </div><br>
    <!-- Lista video -->
    🎞️<div id="videoList"></div>

    <!-- Cancella lista -->
    <div style="text-align:center; margin-top:10px;">
        <button id="clearList">❌ Cancella Lista</button>
    </div>

    <!-- Bottone Dark/Light (posizionato in alto a destra) -->
<button id="themeToggle" style="position:fixed; top:10px; right:10px; z-index:1000; font-size:13px;">🌙</button>

    <script src="renderer.js"></script>
</body>
</html>
